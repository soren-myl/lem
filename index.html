<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'DM Sans',sans-serif;background:#1a3a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  body::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(200,245,66,.04) 59px,rgba(200,245,66,.04) 60px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(200,245,66,.04) 59px,rgba(200,245,66,.04) 60px)}
  .box{background:#f5f0e8;border-radius:10px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.4);position:relative;z-index:1;text-align:center}
  .badge{width:64px;height:64px;background:#c8f542;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 1.25rem;box-shadow:0 0 30px rgba(200,245,66,.4)}
  h1{font-family:'Trebuchet MS',sans-serif;font-size:1.6rem;color:#1a3a1a;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.4rem}
  p{font-size:.85rem;color:#6b5c3e;margin-bottom:1.75rem}
  input{width:100%;padding:.8rem 1rem;border:2px solid #c8c0b0;border-radius:6px;font-size:1rem;font-family:inherit;text-align:center;letter-spacing:.15em;outline:none;background:white;color:#1a1a1a;margin-bottom:.75rem;transition:border-color .2s}
  input:focus{border-color:#2d6e2d}
  button{width:100%;padding:.85rem;background:#1a3a1a;color:#c8f542;border:none;border-radius:6px;font-size:1rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s}
  button:hover{background:#2d6e2d}
  button:disabled{background:#888;color:#ccc;cursor:not-allowed}
  .err{color:#c0392b;font-size:.82rem;margin-top:.6rem;min-height:1.2rem}
  .spin{display:none;margin-top:.5rem;font-size:.8rem;color:#6b5c3e}
</style>
</head>

function b64(s){const b=atob(s);return Uint8Array.from(b,c=>c.charCodeAt(0));}
async function unlock(){
  const pw=document.getElementById('pw').value;
  if(!pw){document.getElementById('err').textContent='Indtast koden';return;}
  const btn=document.getElementById('btn'),spin=document.getElementById('spin');
  btn.disabled=true;spin.style.display='block';document.getElementById('err').textContent='';
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']
    );
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
    const html=new TextDecoder().decode(dec);
    const blob=new Blob([html],{type:'text/html'});
    location.replace(URL.createObjectURL(blob));
  }catch(e){
    document.getElementById('err').textContent='❌ Forkert kode — prøv igen';
    btn.disabled=false;spin.style.display='none';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
document.getElementById('pw').focus();
